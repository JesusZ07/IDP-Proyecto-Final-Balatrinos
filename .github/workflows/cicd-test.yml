name: CI-CD Verificacion .NET

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verificacion:

    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Instalar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Verificar version de .NET
      run: dotnet --version

    - name: Verificar SDKs instalados
      run: dotnet --list-sdks

    - name: Restaurar dependencias
      run: |
        dotnet restore CapaEntidad/CapaEntidad.csproj
        dotnet restore CapaDatos/CapaDatos.csproj
        dotnet restore CapaNegocios/CapaNegocios.csproj

    - name: Compilar proyectos 
      run: |
        dotnet build CapaEntidad/CapaEntidad.csproj --no-restore -c Release
        dotnet build CapaDatos/CapaDatos.csproj --no-restore -c Release
        dotnet build CapaNegocios/CapaNegocios.csproj --no-restore -c Release

    - name: Generar artefactos
      uses: actions/upload-artifact@v4
      with:
        name: build-dotnet
        path: |
          CapaEntidad/bin/Release
          CapaDatos/bin/Release
          CapaNegocios/bin/Release
