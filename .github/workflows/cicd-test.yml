name: .NET CI/CD Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: 9.0.x
      UI_HEADLESS: "true"
      SA_PASSWORD: "P4ssw0rd_Strong_2026#"

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "P4ssw0rd_Strong_2026#"
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore IDP-Proyecto-Final-Balatrinos.sln

      - name: Ajustar cadena de conexion para CI (SQL auth)
        run: |
          sed -i "s|Data Source=.;Initial Catalog=Hotel;Integrated Security=True;TrustServerCertificate=True|Data Source=127.0.0.1,1433;Initial Catalog=Hotel;User ID=sa;Password=${SA_PASSWORD};TrustServerCertificate=True|g" CapaDatos/ConexioBD.cs
          sed -i "s|Data Source=.;Initial Catalog=Hotel;Integrated Security=True;TrustServerCertificate=True|Data Source=127.0.0.1,1433;Initial Catalog=Hotel;User ID=sa;Password=${SA_PASSWORD};TrustServerCertificate=True|g" HotelProyecto.Tests/PruebasUnitarias.cs

      - name: Esperar SQL Server y crear base de datos
        run: |
          for i in {1..30}; do
            if docker run --rm --network host mcr.microsoft.com/mssql-tools /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "$SA_PASSWORD" -C -Q "SELECT 1"; then
              break
            fi
            echo "Esperando SQL Server... intento $i"
            sleep 5
          done
          docker run --rm --network host mcr.microsoft.com/mssql-tools /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "$SA_PASSWORD" -C -Q "IF DB_ID('Hotel') IS NULL CREATE DATABASE Hotel"

      - name: Inicializar esquema y datos
        run: |
          docker run --rm --network host -v "$PWD/Querys:/scripts" mcr.microsoft.com/mssql-tools /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "$SA_PASSWORD" -C -d Hotel -i "/scripts/Crear tablas.sql"
          docker run --rm --network host -v "$PWD/Querys:/scripts" mcr.microsoft.com/mssql-tools /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "$SA_PASSWORD" -C -d Hotel -i "/scripts/Llenar tablas.sql"

      - name: Build Release
        run: dotnet build IDP-Proyecto-Final-Balatrinos.sln --no-restore --configuration Release

      - name: Build Debug (requerido por UI tests con --no-build)
        run: dotnet build HotelProyecto/HotelProyecto.csproj --no-restore --configuration Debug

      - name: Instalar navegador Playwright
        run: pwsh HotelProyecto.Tests/bin/Release/net9.0/playwright.ps1 install --with-deps chromium

      - name: Ejecutar pruebas integradas (unitarias + UI)
        run: |
          dotnet test HotelProyecto.Tests/HotelProyecto.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=TestResults.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Instalar herramientas de analisis
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generar reporte de cobertura HTML
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Html;HtmlSummary"

      - name: Lint con StyleCop
        run: |
          dotnet build IDP-Proyecto-Final-Balatrinos.sln \
            --no-restore \
            --configuration Release \
            /p:EnforceCodeStyleInBuild=true \
            /p:TreatWarningsAsErrors=false
        continue-on-error: true

      - name: Crear carpeta de artefactos
        run: |
          mkdir -p build/reports
          mkdir -p build/coverage

      - name: Copiar reportes
        run: |
          cp -r coverage-report/* build/coverage/
          cp -r TestResults/* build/reports/

      - name: Copiar archivos compilados
        run: |
          cp IDP-Proyecto-Final-Balatrinos.sln build/
          cp -r HotelProyecto/bin/Release build/HotelProyecto/
          cp -r CapaPresentacion/bin/Release build/CapaPresentacion/

      - name: Subida de artefactos de prueba
        uses: actions/upload-artifact@v4
        with:
          name: Artefacto-Prueba-DotNet
          path: build/
          retention-days: 30

      - name: Subida de cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          flags: integrated-tests
          name: codecov-dotnet
          fail_ci_if_error: false

