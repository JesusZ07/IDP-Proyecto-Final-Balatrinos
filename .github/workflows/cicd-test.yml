name: NET CI/CD Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-unit:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "Str0ng!Passw0rd123"
        ports:
          - 1433:1433

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Esperar SQL Server
      run: sleep 30

    - name: Ejecutar pruebas unitarias
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TestDB;User Id=sa;Password=Str0ng!Passw0rd123;TrustServerCertificate=True;Encrypt=False;"
      run: dotnet test --logger "trx" --results-directory TestResults

    - name: Subir resultados
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Reporte-PruebasUnitarias
        path: TestResults/
        retention-days: 30


  test-ui:
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release
    - name: Instalar navegadores Playwright (.NET)
      shell: pwsh
      run: |
        cd HotelProyecto.Tests
        pwsh bin/Release/net9.0/playwright.ps1 install
    - name: Iniciar aplicación web
      run: |
        dotnet run --project HotelProyecto/HotelProyecto.csproj --urls "http://localhost:5000" &
        sleep 15

    - name: Ejecutar pruebas UI
      shell: pwsh
      env:
        BASE_URL: "http://localhost:5000"
      run: |
        ./scripts/run-tests.ps1 -Suite ui

    - name: Subir resultados UI
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Reporte-PruebasUI
        path: HotelProyecto.Tests/TestResults/
        retention-days: 30
