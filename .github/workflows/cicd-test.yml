name: NET Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore HotelProyecto.Tests/HotelProyecto.Tests.csproj

    - name: Build
      run: dotnet build HotelProyecto.Tests/HotelProyecto.Tests.csproj --no-restore --configuration Release

    - name: Install Playwright
      shell: pwsh
      run: |
        cd HotelProyecto.Tests
        pwsh bin/Release/net9.0/playwright.ps1 install

    - name: Start Web App
      run: |
        dotnet run --project HotelProyecto/HotelProyecto.csproj --urls "http://localhost:5000" &
        sleep 15

    - name: Run Tests
      shell: pwsh
      env:
        BASE_URL: "http://localhost:5000"
        ASPNETCORE_ENVIRONMENT: "Testing"
      run: |
        dotnet test HotelProyecto.Tests/HotelProyecto.Tests.csproj `
          --no-build `
          --logger "trx" `
          --results-directory TestResults

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: TestResults/
        retention-days: 30
