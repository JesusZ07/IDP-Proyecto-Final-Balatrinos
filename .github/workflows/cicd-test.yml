name: NET Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "Str0ng!Passw0rd123"
        ports:
          - 1433:1433

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore HotelProyecto.Tests/HotelProyecto.Tests.csproj

    - name: Build
      run: dotnet build HotelProyecto.Tests/HotelProyecto.Tests.csproj --no-restore --configuration Release

    - name: Install Playwright
      shell: pwsh
      run: |
        cd HotelProyecto.Tests
        pwsh bin/Release/net9.0/playwright.ps1 install --with-deps

    - name: Wait for SQL Server
      run: sleep 30

    - name: Add EF Design Package
      run: dotnet add HotelProyecto/HotelProyecto.csproj package Microsoft.EntityFrameworkCore.Design

    - name: Init Database
      run: |
        dotnet tool install --global dotnet-ef
        dotnet ef database update --project CapaDatos --startup-project HotelProyecto

    - name: Start Web App
      run: |
        dotnet run --project HotelProyecto/HotelProyecto.csproj --urls "http://localhost:5000" &
        sleep 15

    - name: Run Tests
      env:
        BASE_URL: "http://localhost:5000"
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TestDB;User Id=sa;Password=Str0ng!Passw0rd123;TrustServerCertificate=True;Encrypt=False;"
      run: dotnet test HotelProyecto.Tests/HotelProyecto.Tests.csproj --no-build --logger "trx" --results-directory TestResults

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: TestResults/
        retention-days: 30
