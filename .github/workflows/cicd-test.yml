name: .NET Tests (Unitarias)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      EnableWindowsTargeting: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run Safe Unit Tests Only
      run: dotnet test HotelProyecto.Tests/HotelProyecto.Tests.csproj --no-build --filter "FullyQualifiedName~PruebasUnitarias&FullyQualifiedName!~Conexion&FullyQualifiedName!~BD&FullyQualifiedName!~Reservacion&FullyQualifiedName!~Habitacion&FullyQualifiedName!~Huesped" --logger "trx" --results-directory TestResults

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: TestResults
