name: Pruebas de humo

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
    
      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
    
      - name: Restaurar dependencias de la web
        run: dotnet restore HotelProyecto/HotelProyecto.csproj
    
      - name: Compilar aplicación web
        run: dotnet build HotelProyecto/HotelProyecto.csproj --no-restore --configuration Release
    
      - name: Ejecutar pruebas de humo y generar reportes
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "scripts/run-tests.ps1" -Suite smoke
    
      - name: Preparar estructura de artefactos
        shell: pwsh
        run: |
          $buildDir = "build/smoke-tests"
          New-Item -ItemType Directory -Force -Path "$buildDir/reports" | Out-Null
          New-Item -ItemType Directory -Force -Path "$buildDir/logs" | Out-Null
          
          # Copiar reportes de humo
          if (Test-Path "HotelProyecto.Tests/TestResults/Run-smoke") {
            if (Test-Path "HotelProyecto.Tests/TestResults/Run-smoke/report.html") {
              Copy-Item -Path "HotelProyecto.Tests/TestResults/Run-smoke/report.html" `
                -Destination "$buildDir/reports/" -Force
            }
            if (Test-Path "HotelProyecto.Tests/TestResults/Run-smoke/newman-results.xml") {
              Copy-Item -Path "HotelProyecto.Tests/TestResults/Run-smoke/newman-results.xml" `
                -Destination "$buildDir/reports/" -Force
            }
          }
      
      - name: Mostrar estructura de artefactos
        shell: pwsh
        run: |
          if (Test-Path "build") {
            Write-Host "Estructura de artefactos" 
            Get-ChildItem -Path "build" -Recurse | Select-Object FullName
          }
    
      - name: Subida de artefactos de pruebas de humo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-SmokeTest
          path: build/smoke-tests/
          retention-days: 30
      
      - name: Mostrar estado de pruebas
        shell: pwsh
        run: |
          if (Test-Path "HotelProyecto.Tests/TestResults/Run-smoke/report.html") {
            Write-Host "Reporte HTML de smoke tests generado correctamente"
          } else {
            Write-Host "Reporte HTML no encontrado"
          }
